 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moonlight Shop</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #05070f, #0b0f1a);
  color: white;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 25px;
  background: rgba(17, 24, 39, 0.8);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.logo {
  color: #00eaff;
  font-weight: bold;
}

.links a {
  margin-left: 15px;
  text-decoration: none;
  color: #ccc;
}

.links a:hover {
  color: #00eaff;
}

/* CONTAINER */
.container {
  padding: 30px;
}

h1 {
  text-align: center;
  color: #00eaff;
}

.subtitle {
  text-align: center;
  opacity: 0.7;
  margin-bottom: 30px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 20px;
}

/* CARD */
.card {
  background: rgba(17, 24, 39, 0.85);
  padding: 20px;
  border-radius: 16px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.08);
  cursor: pointer;
  transition: 0.3s;
  backdrop-filter: blur(8px);
}

.card:hover {
  transform: translateY(-6px) scale(1.02);
  border-color: #00eaff;
  box-shadow: 0 0 20px rgba(0, 234, 255, 0.2);
}

.icon {
  font-size: 32px;
  margin-bottom: 10px;
}

.name {
  font-weight: bold;
  margin-bottom: 5px;
}

.price {
  color: gold;
  font-weight: bold;
  font-size: 14px;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #111827;
  padding: 25px;
  border-radius: 14px;
  width: 90%;
  max-width: 420px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.1);
  animation: pop 0.25s ease;
}

@keyframes pop {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.close {
  float: right;
  cursor: pointer;
  color: red;
  font-size: 18px;
}

.modal-icon {
  font-size: 50px;
  margin-bottom: 10px;
}

.modal-title {
  font-size: 20px;
  font-weight: bold;
}

.modal-price {
  color: gold;
  margin: 8px 0;
}

.modal-desc {
  font-size: 14px;
  opacity: 0.8;
  margin-bottom: 15px;
}

/* BUTTON */
.copy-btn {
  padding: 10px 15px;
  border: none;
  background: linear-gradient(135deg, #00eaff, #00c3ff);
  color: black;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

.copy-btn:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<nav>
  <div class="logo">🌙 Moonlight</div>
  <div class="links">
    <a href="../">Home</a>
    <a href="../shop/">Shop</a>
    <a href="../support/">Support</a>
    <a href="../info/">Info</a>
  </div>
</nav>

<div class="container">
  <h1>🛒 Moonlight Shop</h1>
  <p class="subtitle">Click an item to view details and copy its ID</p>

  <div class="grid" id="shopGrid"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>

    <div class="modal-icon" id="modalIcon"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-price" id="modalPrice"></div>
    <div class="modal-desc" id="modalDesc"></div>

    <button class="copy-btn" onclick="copyItemId()">📋 Copy Item ID</button>
  </div>
</div>

<script>
const items = [
  { id:"fish01", icon:"🐟", name:"Golden Fish", price:"25,000 MC", desc:"A shiny rare fish." },
  { id:"rod01", icon:"🎣", name:"Fishing Rod", price:"30,000 MC", desc:"Improves fishing." },
  { id:"bait01", icon:"🪱", name:"Premium Bait", price:"35,000 MC", desc:"Better catch rate." },
  { id:"net01", icon:"🕸️", name:"Fishing Net", price:"40,000 MC", desc:"Catch multiple items." },
  { id:"hook01", icon:"🪝", name:"Sharp Hook", price:"45,000 MC", desc:"Stronger catches." },

  { id:"sword01", icon:"🗡️", name:"Iron Sword", price:"50,000 MC", desc:"Basic weapon." },
  { id:"sword02", icon:"⚔️", name:"Steel Sword", price:"75,000 MC", desc:"Stronger attack." },
  { id:"sword03", icon:"🔥", name:"Mythril Sword", price:"120,000 MC", desc:"Rare blade." },

  { id:"armor01", icon:"🛡️", name:"Leather Armor", price:"70,000 MC", desc:"Basic defense." },
  { id:"armor02", icon:"🛡️", name:"Iron Armor", price:"130,000 MC", desc:"Stronger defense." },
  { id:"armor03", icon:"🐉", name:"Dragon Armor", price:"500,000 MC", desc:"Elite armor." },

  { id:"pet01", icon:"🐺", name:"Wolf Pet", price:"150,000 MC", desc:"Loyal companion." },
  { id:"pet02", icon:"🐉", name:"Dragon Pet", price:"800,000 MC", desc:"Powerful pet." },
  { id:"pet03", icon:"🔥", name:"Phoenix Pet", price:"1,200,000 MC", desc:"Revives itself." },

  { id:"boost01", icon:"⚡", name:"XP Booster", price:"90,000 MC", desc:"Gain more XP." },
  { id:"boost02", icon:"💰", name:"Coin Booster", price:"200,000 MC", desc:"Earn more coins." },

  { id:"crate01", icon:"📦", name:"Mystery Crate", price:"100,000 MC", desc:"Random rewards." },
  { id:"crate02", icon:"🎁", name:"Epic Crate", price:"300,000 MC", desc:"Higher tier loot." },

  { id:"ticket01", icon:"🎟️", name:"Lottery Ticket", price:"50,000 MC", desc:"Chance to win big." },

  { id:"house01", icon:"🏠", name:"Small House", price:"2,000,000 MC", desc:"Luxury property." },
  { id:"car01", icon:"🚗", name:"Sports Car", price:"5,000,000 MC", desc:"Fast and stylish." },
  { id:"crown01", icon:"👑", name:"Royal Crown", price:"10,000,000 MC", desc:"Symbol of power." },
  { id:"legend01", icon:"💎", name:"Legendary Relic", price:"20,000,000 MC", desc:"Ultra rare item." }
];

const grid = document.getElementById("shopGrid");

let currentItemId = null;

items.forEach(item => {
  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <div class="icon">${item.icon}</div>
    <div class="name">${item.name}</div>
    <div class="price">${item.price}</div>
  `;

  div.onclick = () => openModal(item);
  grid.appendChild(div);
});

function openModal(item) {
  currentItemId = item.id;

  document.getElementById("modalIcon").innerText = item.icon;
  document.getElementById("modalTitle").innerText = item.name;
  document.getElementById("modalPrice").innerText = item.price;
  document.getElementById("modalDesc").innerText = item.desc;

  document.getElementById("modal").style.display = "flex";
}

function copyItemId() {
  if (!currentItemId) return;

  navigator.clipboard.writeText(currentItemId).then(() => {
    alert("Copied Item ID: " + currentItemId);
  });
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

window.onclick = function(event) {
  const modal = document.getElementById("modal");
  if (event.target === modal) {
    modal.style.display = "none";
  }
};
</script>

</body>
</html>
