<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moonlight Shop</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f1a;
      color: white;
    }

    nav {
      display: flex;
      justify-content: space-between;
      padding: 15px 25px;
      background: #111827;
    }

    .logo {
      color: #00eaff;
      font-weight: bold;
    }

    .links a {
      margin-left: 15px;
      text-decoration: none;
      color: #ccc;
    }

    .links a:hover {
      color: #00eaff;
    }

    .container {
      padding: 25px;
    }

    h1 {
      text-align: center;
      color: #00eaff;
    }

    .subtitle {
      text-align: center;
      opacity: 0.7;
      margin-bottom: 25px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 25px;
    }

    .card {
      background: #111827;
      padding: 25px;
      border-radius: 14px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      transition: 0.2s;

      min-height: 170px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: #00eaff;
      box-shadow: 0 0 12px rgba(0, 234, 255, 0.15);
    }

    .icon {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .name {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .price {
      color: gold;
      font-weight: bold;
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #111827;
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .close {
      float: right;
      cursor: pointer;
      color: red;
      font-size: 20px;
    }

    .modal-icon {
      font-size: 50px;
      margin-bottom: 10px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .modal-price {
      color: gold;
      margin-bottom: 10px;
    }

    .modal-desc {
      font-size: 14px;
      opacity: 0.8;
    }

  </style>
</head>

<body>

<nav>
  <div class="logo">🌙 Moonlight</div>
  <div class="links">
    <a href="../">Home</a>
    <a href="../shop/">Shop</a>
    <a href="../support/">Support</a>
    <a href="../info/">Info</a>
  </div>
</nav>

<div class="container">

  <h1>🛒 Moonlight Shop</h1>
  <p class="subtitle">Future items for Moonlight Haven</p>

  <div class="grid" id="shopGrid"></div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>

    <div class="modal-icon" id="modalIcon"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-price" id="modalPrice"></div>
    <div class="modal-desc" id="modalDesc"></div>
  </div>
</div>

<script>
  const items = [
    {icon:"🎟️", name:"Lottery Ticket", price:"1,000 MC", desc:"Join lottery rewards."},
    {icon:"🐟", name:"Fish", price:"2,500 MC", desc:"Trading collectible."},
    {icon:"💵", name:"Bank Note", price:"10,000 MC", desc:"Stored value item."},
    {icon:"🎁", name:"Mystery Box", price:"15,000 MC", desc:"Random rewards."},
    {icon:"👑", name:"VIP Pass", price:"50,000 MC", desc:"Premium perks."},
    {icon:"⚡", name:"Boost Pack", price:"3,000 MC", desc:"Temporary boost."}
  ];

  // Generate up to 50 items by cloning with variations
  for (let i = 1; i <= 50; i++) {
    let base = items[i % items.length];
    items.push({
      icon: base.icon,
      name: base.name + " " + i,
      price: base.price,
      desc: base.desc
    });
  }

  const grid = document.getElementById("shopGrid");

  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <div class="icon">${item.icon}</div>
      <div class="name">${item.name}</div>
      <div class="price">${item.price}</div>
    `;

    div.onclick = () => openModal(item);
    grid.appendChild(div);
  });

  function openModal(item) {
    document.getElementById("modalIcon").innerText = item.icon;
    document.getElementById("modalTitle").innerText = item.name;
    document.getElementById("modalPrice").innerText = item.price;
    document.getElementById("modalDesc").innerText = item.desc;
    document.getElementById("modal").style.display = "flex";
  }

  function closeModal() {
    document.getElementById("modal").style.display = "none";
  }

  window.onclick = function(event) {
    let modal = document.getElementById("modal");
    if (event.target == modal) {
      modal.style.display = "none";
    }
  }
</script>

</body>
</html>
