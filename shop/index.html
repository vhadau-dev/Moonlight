<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moonlight Shop</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f1a;
      color: white;
    }

    nav {
      display: flex;
      justify-content: space-between;
      padding: 15px 25px;
      background: #111827;
    }

    .logo {
      color: #00eaff;
      font-weight: bold;
    }

    .links a {
      margin-left: 15px;
      text-decoration: none;
      color: #ccc;
    }

    .links a:hover {
      color: #00eaff;
    }

    .container {
      padding: 25px;
    }

    h1 {
      text-align: center;
      color: #00eaff;
    }

    .subtitle {
      text-align: center;
      opacity: 0.7;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
    }

    .card {
      background: #111827;
      padding: 16px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: #00eaff;
    }

    .icon {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .name {
      font-weight: bold;
      margin-bottom: 5px;
    }

    .price {
      color: gold;
      font-weight: bold;
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #111827;
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .close {
      float: right;
      cursor: pointer;
      color: red;
      font-size: 20px;
    }

    .modal-icon {
      font-size: 50px;
      margin-bottom: 10px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .modal-price {
      color: gold;
      margin-bottom: 10px;
    }

    .modal-desc {
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<nav>
  <div class="logo">🌙 Moonlight</div>
  <div class="links">
    <a href="../">Home</a>
    <a href="../shop/">Shop</a>
    <a href="../support/">Support</a>
    <a href="../info/">Info</a>
  </div>
</nav>

<div class="container">

  <h1>🛒 Moonlight Shop</h1>
  <p class="subtitle">Click an item to view details</p>

  <div class="grid">

    <div class="card" onclick="openModal('🎟️','Lottery Ticket','1,000 MC','Join the lottery and stand a chance to win rewards.')">
      <div class="icon">🎟️</div>
      <div class="name">Lottery Ticket</div>
      <div class="price">1,000 MC</div>
    </div>

    <div class="card" onclick="openModal('🐟','Fish','2,500 MC','A collectible item used for fun and trading.')">
      <div class="icon">🐟</div>
      <div class="name">Fish</div>
      <div class="price">2,500 MC</div>
    </div>

    <div class="card" onclick="openModal('💵','Bank Note','10,000 MC','Represents stored value within the system.')">
      <div class="icon">💵</div>
      <div class="name">Bank Note</div>
      <div class="price">10,000 MC</div>
    </div>

    <div class="card" onclick="openModal('🎁','Mystery Box','15,000 MC','Contains random rewards when opened.')">
      <div class="icon">🎁</div>
      <div class="name">Mystery Box</div>
      <div class="price">15,000 MC</div>
    </div>

    <div class="card" onclick="openModal('👑','VIP Pass','50,000 MC','Unlock premium perks and recognition.')">
      <div class="icon">👑</div>
      <div class="name">VIP Pass</div>
      <div class="price">50,000 MC</div>
    </div>

    <div class="card" onclick="openModal('⚡','Boost Pack','3,000 MC','Temporary boost to activity rewards.')">
      <div class="icon">⚡</div>
      <div class="name">Boost Pack</div>
      <div class="price">3,000 MC</div>
    </div>

  </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>

    <div class="modal-icon" id="modalIcon"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-price" id="modalPrice"></div>
    <div class="modal-desc" id="modalDesc"></div>
  </div>
</div>

<script>
  function openModal(icon, title, price, desc) {
    document.getElementById("modalIcon").innerText = icon;
    document.getElementById("modalTitle").innerText = title;
    document.getElementById("modalPrice").innerText = price;
    document.getElementById("modalDesc").innerText = desc;
    document.getElementById("modal").style.display = "flex";
  }

  function closeModal() {
    document.getElementById("modal").style.display = "none";
  }

  window.onclick = function(event) {
    let modal = document.getElementById("modal");
    if (event.target == modal) {
      modal.style.display = "none";
    }
  }
</script>

</body>
</html>  </html>
